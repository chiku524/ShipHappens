name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check game + accounts workspace
        run: cargo check --workspace
      - name: Unit / integration tests
        run: cargo test --workspace --exclude pudgymon-accounts

  accounts-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/accounts
    steps:
      - uses: actions/checkout@v4
      - name: Build accounts Docker image
        run: |
          printf '%s\n' \
            'POSTGRES_USER=pudgymon' \
            'POSTGRES_PASSWORD=ci-test-password' \
            'POSTGRES_DB=pudgymon_accounts' \
            'JWT_SECRET=ci-test-jwt-secret-not-for-prod' \
            'POSTGRES_HOST_PORT=5434' \
            'API_HOST_PORT=8788' \
            > .env
          docker compose build api
